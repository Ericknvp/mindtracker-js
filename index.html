<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MindTracker-JS</title>
    <link rel="stylesheet" href="styles/main.css" />
  </head>
  <body>
    <div class="containerFather">
      <header class="headerContainer">
        <div class="logo">
          <div class="iconLogo">[SVG Logo]</div>
          <h1>MindTracker</h1>
        </div>
        <div class="buttons">
          <button
            type="button"
            class="actionButton"
            aria-label="Descargar datos"
          >
            [SVG Descargar]
          </button>
          <button type="button" class="actionButton" aria-label="Cambiar tema">
            [SVG Sol/Luna]
          </button>
        </div>
      </header>

      <main class="dashboardContainer">
        <aside class="counter">
          <section class="titleCounterSection">
            <div class="iconDash">[SVG Gráfica]</div>
            <h3>Rendimiento</h3>
          </section>

          <section class="counters">
            <div class="total">
              <h3>0</h3>
              <p>Total</p>
            </div>
            <div class="lists">
              <h3>0</h3>
              <p>Listas</p>
            </div>
          </section>

          <section class="notes">
            <div class="notesTitle">
              <span>[SVG Nota]</span>
              <h3>Bloc de notas</h3>
            </div>
            <textarea
              placeholder="Captura tus ideas rápidamente... (Auto-guardado)"
            ></textarea>
          </section>
        </aside>

        <section class="addTasks">
          <form class="writeTasks">
            <input
              type="text"
              class="inputWriteTask"
              placeholder="Escribe una nueva tarea..."
              required
            />
            <button type="submit">[SVG Agregar] Agregar</button>
          </form>

          <div class="searchTasks">
            <input
              type="search"
              class="textInput"
              placeholder="Buscar tareas (Debounce)..."
            />
            <span class="searchIcon">[SVG Buscar]</span>
          </div>

          <ul class="tasksContainer">
            <li class="task">
              <span class="draggableIcon">[SVG Arrastrar]</span>
              <input type="checkbox" name="taskCompleted" id="task1" />
              <label for="task1">Gimnasio</label>

              <button type="button" title="Eliminar tarea" class="trashBtn">
                [SVG Basura]
              </button>
            </li>
          </ul>
        </section>
      </main>
    </div>

    <script>
      const colores = [
        "red",
        "blue",
        "green",
        "orange",
        "purple",
        "brown",
        "pink",
        "cyan",
      ];
      function aplicarBordes(elemento, nivel = 0) {
        const color = colores[nivel % colores.length];
        elemento.style.border = `1px solid ${color}`;
        if (elemento.children) {
          Array.from(elemento.children).forEach((hijo) => {
            aplicarBordes(hijo, nivel + 1);
          });
        }
      }
      aplicarBordes(document.body);
    </script>
  </body>
</html>
