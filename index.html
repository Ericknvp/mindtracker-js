<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MindTracker-JS</title>
    <link rel="stylesheet" href="styles/main.css" />
  </head>
  <body>
    <div class="containerFather">
      <header class="headerContainer">
        <div class="logo">
          <div class="iconLogo" data-icon="logo"></div>
          <h1>MindTracker</h1>
        </div>

        <div class="buttons">
          <button
            type="button"
            class="actionButton"
            aria-label="Descargar datos"
            data-icon="descargar"
          ></button>

          <button
            type="button"
            class="actionButton"
            aria-label="Cambiar tema"
            data-icon="sol"
          ></button>
        </div>
      </header>

      <main class="dashboardContainer">
        <aside class="counter dashContainer">
          <section class="titleCounterSection">
            <div class="iconDash" data-icon="grafica"></div>
            <h3>Rendimiento</h3>
          </section>

          <section class="counters">
            <div class="total cardCounter">
              <h3>0</h3>
              <p>Total</p>
            </div>
            <div class="lists cardCounter">
              <h3>0</h3>
              <p>Listas</p>
            </div>
          </section>

          <section class="notes">
            <div class="notesTitle titleCounterSection">
              <span data-icon="nota" class="iconDash"></span>
              <h3>Bloc de Notas</h3>
            </div>
            <textarea
              id="blocTextArea"
              class="inputText"
              placeholder="Captura tus ideas rápidamente... 
(Auto-guardado)"
            ></textarea>
          </section>
        </aside>

        <section class="addTasks dashContainer">
          <form class="writeTasks">
            <input
              type="text"
              class="inputWriteTask inputText"
              placeholder="Escribe una nueva tarea..."
              required
            />
            <button type="submit">
              <span data-icon="agregar"></span>
              Agregar
            </button>
          </form>

          <div class="searchTasks">
            <input
              type="search"
              class="textInput inputText"
              placeholder="Buscar tareas (Debounce)..."
            />
            <span class="searchIcon" data-icon="buscar"></span>
          </div>

          <ul class="tasksContainer">
            <li class="task" draggable="true">
              <span class="draggableIcon" data-icon="arrastrar"></span>
              <input type="checkbox" name="taskCompleted" id="task1" />
              <label for="task1">Gimnasio</label>

              <button
                type="button"
                title="Eliminar tarea"
                class="trashBtn"
                data-icon="basura"
              ></button>
            </li>
            <li class="task" draggable="true">
              <span class="draggableIcon" data-icon="arrastrar"></span>
              <input type="checkbox" name="taskCompleted" id="task1" />
              <label for="task1">Cepillado</label>

              <button
                type="button"
                title="Eliminar tarea"
                class="trashBtn"
                data-icon="basura"
              ></button>
            </li>
          </ul>
        </section>
      </main>
    </div>

    <script type="module">
      import { icons } from "./javascript/components/icons.js";

      function renderIcons() {
        console.log("Objeto icons recibido:", icons);

        const elements = document.querySelectorAll("[data-icon]");

        elements.forEach((el) => {
          const name = el.dataset.icon;
          if (icons && icons[name]) {
            el.innerHTML = icons[name];
            console.log(`Icono "${name}" insertado.`);
          } else {
            console.warn(`No se encontró el SVG para: "${name}"`);
          }
        });
      }

      renderIcons();
    </script>
    <button
      id="debugToggle"
      style="
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 9999;
        padding: 10px 15px;
        background: #333;
        color: white;
        border: 1px solid #555;
        border-radius: 8px;
        cursor: pointer;
        font-family: sans-serif;
        font-size: 12px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
      "
    >
      🛠️ Activar Bordes
    </button>

    <script>
      (function () {
        const btn = document.getElementById("debugToggle");
        let isDebugActive = false;

        // Colores por nivel
        const borderColors = [
          "#FF1A1A",
          "#1AFF1A",
          "#1A1AFF",
          "#FF1AFF",
          "#FFFF1A",
          "#1AFFFF",
        ];

        function toggleVisualDebug() {
          const allElements = document.querySelectorAll("body *");

          isDebugActive = !isDebugActive;

          allElements.forEach((el) => {
            // No aplicar bordes al botón de debug en sí mismo
            if (el.id === "debugToggle") return;

            if (isDebugActive) {
              // ACTIVAR
              let depth = 0;
              let parent = el.parentElement;
              while (parent && parent !== document.body) {
                depth++;
                parent = parent.parentElement;
              }
              const color = borderColors[depth % borderColors.length];
              el.style.setProperty(
                "outline",
                `1px solid ${color}`,
                "important",
              );
              el.dataset.oldTitle = el.title; // Guardar title original
              el.title = `Nivel: ${depth} | Tag: ${el.tagName.toLowerCase()}`;
            } else {
              // DESACTIVAR
              el.style.removeProperty("outline");
              el.title = el.dataset.oldTitle || ""; // Restaurar title
            }
          });

          // Actualizar estilo del botón
          btn.textContent = isDebugActive
            ? "🚫 Quitar Bordes"
            : "🛠️ Activar Bordes";
          btn.style.background = isDebugActive ? "#b30000" : "#333";
        }

        btn.addEventListener("click", toggleVisualDebug);
      })();
    </script>
  </body>
</html>
