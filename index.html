<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MindTracker</title>
    <link rel="stylesheet" href="styles/main.css" />
  </head>
  <body>
    <div class="container">
      <div class="left box" id="leftt">
        <ul id="left">
          <li class="item" draggable="true">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="32"
              height="32"
              fill="#000000"
              viewBox="0 0 256 256"
            >
              <path
                d="M104,60A12,12,0,1,1,92,48,12,12,0,0,1,104,60Zm60,12a12,12,0,1,0-12-12A12,12,0,0,0,164,72ZM92,116a12,12,0,1,0,12,12A12,12,0,0,0,92,116Zm72,0a12,12,0,1,0,12,12A12,12,0,0,0,164,116ZM92,184a12,12,0,1,0,12,12A12,12,0,0,0,92,184Zm72,0a12,12,0,1,0,12,12A12,12,0,0,0,164,184Z"
              ></path>
            </svg>
            <p>Item 1</p>
          </li>
          <li class="item" draggable="true">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="32"
              height="32"
              fill="#000000"
              viewBox="0 0 256 256"
            >
              <path
                d="M104,60A12,12,0,1,1,92,48,12,12,0,0,1,104,60Zm60,12a12,12,0,1,0-12-12A12,12,0,0,0,164,72ZM92,116a12,12,0,1,0,12,12A12,12,0,0,0,92,116Zm72,0a12,12,0,1,0,12,12A12,12,0,0,0,164,116ZM92,184a12,12,0,1,0,12,12A12,12,0,0,0,92,184Zm72,0a12,12,0,1,0,12,12A12,12,0,0,0,164,184Z"
              ></path>
            </svg>
            <p>Item 2</p>
          </li>
          <li class="item" draggable="true">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="32"
              height="32"
              fill="#000000"
              viewBox="0 0 256 256"
            >
              <path
                d="M104,60A12,12,0,1,1,92,48,12,12,0,0,1,104,60Zm60,12a12,12,0,1,0-12-12A12,12,0,0,0,164,72ZM92,116a12,12,0,1,0,12,12A12,12,0,0,0,92,116Zm72,0a12,12,0,1,0,12,12A12,12,0,0,0,164,116ZM92,184a12,12,0,1,0,12,12A12,12,0,0,0,92,184Zm72,0a12,12,0,1,0,12,12A12,12,0,0,0,164,184Z"
              ></path>
            </svg>
            <p>Item 3</p>
          </li>
          <li class="item" draggable="true">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="32"
              height="32"
              fill="#000000"
              viewBox="0 0 256 256"
            >
              <path
                d="M104,60A12,12,0,1,1,92,48,12,12,0,0,1,104,60Zm60,12a12,12,0,1,0-12-12A12,12,0,0,0,164,72ZM92,116a12,12,0,1,0,12,12A12,12,0,0,0,92,116Zm72,0a12,12,0,1,0,12,12A12,12,0,0,0,164,116ZM92,184a12,12,0,1,0,12,12A12,12,0,0,0,92,184Zm72,0a12,12,0,1,0,12,12A12,12,0,0,0,164,184Z"
              ></path>
            </svg>
            <p>Item 4</p>
          </li>
        </ul>
      </div>
      <div class="right box" id="rightt">
        <ul id="right"></ul>
      </div>
    </div>
    <script>
      // seleccionar elementos
      let lists = document.getElementsByClassName("item");
      let rightBox = document.getElementById("right");
      let leftBox = document.getElementById("left");

      let selected = null;

      // detectar el elemento que se arrastra
      for (let list of lists) {
        list.addEventListener("dragstart", function (e) {
          selected = e.currentTarget; // siempre el <li>
        });
      }

      // función reutilizable para ambos lados
      function enableDrop(box) {
        box.addEventListener("dragover", function (e) {
          e.preventDefault(); // necesario para permitir drop
        });

        box.addEventListener("drop", function () {
          if (selected) {
            box.appendChild(selected);
            selected = null;
          }
        });
      }

      // activar en ambos contenedores
      enableDrop(rightBox);
      enableDrop(leftBox);
    </script>
  </body>
</html>
