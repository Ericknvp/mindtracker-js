<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MindTracker-JS</title>
    <link rel="stylesheet" href="styles/main.css" />
  </head>
  <body>
    <!-- Contenedor padre -->
    <div class="containerFather">
      <!-- Header -->
      <header class="headerContainer">
        <!-- Logo -->
        <div class="logo">
          <div class="iconLogo">[Icono logo]</div>
          <h1>MindTracker</h1>
        </div>
        <!-- Botones de configuración -->
        <div class="buttons">
          <button
            type="button"
            class="actionButton"
            aria-label="Descargar datos"
          >
            [Icono descargar]
          </button>
          <button type="button" class="actionButton" aria-label="Cambiar tema">
            [Icono sol/luna]
          </button>
        </div>
      </header>
      <!-- Contenedor dashboard -->
      <main class="dashboardContainer">
        <!-- Lateral, rendimiento y notas -->
        <aside class="counter">
          <!-- Título rendimiento -->
          <section class="titleCounterSection">
            <div class="iconDash">[Icono gráfica]</div>
            <h3>Rendimiento</h3>
          </section>
          <!-- Sección de contadores -->
          <section class="counters">
            <div class="total">
              <h3>0</h3>
              <p>Total</p>
            </div>
            <div class="lists">
              <h3>0</h3>
              <p>Listas</p>
            </div>
          </section>
          <!-- Bloc de notas -->
          <section class="notes">
            <div class="notesTitle">
              <span>[Icono nota]</span>
              <h3>Bloc de notas</h3>
            </div>
            <textarea
              placeholder="Captura tus ideas rápidamente... (Auto-guardado)"
            ></textarea>
          </section>
        </aside>
        <!-- Sección principal de tareas -->
        <section class="addTasks">
          <!-- formulario agregar tareas -->
          <form class="writeTasks">
            <input
              type="text"
              class="inputWriteTask"
              placeholder="Escribe una nueva tarea..."
              required
            />
            <button type="submit">[Icono agregar] Agregar</button>
          </form>
          <!-- Barra de búsqueda -->
          <div class="searchTasks">
            <input
              type="search"
              class="textInput"
              placeholder="Buscar tareas (Debounce)..."
            />
            <i class="searchIcon">[Icono buscar]</i>
          </div>
          <!-- Lista de tareas -->
          <ul class="tasksContainer">
            Item de tarea individual
            <li class="task">
              <i class="draggableIcon">[Icono arrastrable]</i>
              <input type="checkbox" name="taskCompleted" id="task1" />
              <label for="task1">Gimnasio</label>
              <button type="button" title="Eliminar tarea">
                <i class="trashIcon">[Icono basura]</i>
              </button>
            </li>
          </ul>
        </section>
      </main>
    </div>
    <script>
      const colores = [
        "red",
        "blue",
        "green",
        "orange",
        "purple",
        "brown",
        "pink",
        "cyan",
      ];
      function aplicarBordes(elemento, nivel = 0) {
        const color = colores[nivel % colores.length];
        elemento.style.border = `1px solid ${color}`;
        if (elemento.children) {
          Array.from(elemento.children).forEach((hijo) => {
            aplicarBordes(hijo, nivel + 1);
          });
        }
      }
      aplicarBordes(document.body);
    </script>
  </body>
</html>
